<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LOSAI — TikTok connection</title>
<style>
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;max-width:600px;margin:80px auto;padding:0 24px;text-align:center;color:#1a1a1a;line-height:1.6}
  h2{background:linear-gradient(135deg,#7C3AED,#2563EB);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  code{background:#f2f4f7;padding:2px 8px;border-radius:5px;word-break:break-all}
  .box{margin-top:24px;padding:16px;border:1px solid #e2e6ea;border-radius:10px;text-align:left}
</style>
</head>
<body>
<h2>TikTok connection</h2>
<p id="msg">Processing…</p>
<div class="box" id="detail" style="display:none"></div>
<script>
  var qs = window.location.search;
  var p = new URLSearchParams(qs);
  var msg = document.getElementById('msg');
  var det = document.getElementById('detail');
  if (p.get('code')) {
    msg.textContent = "Authorization received — returning you to the LOSAI app…";
    window.location.href = "http://127.0.0.1:5055/tiktok/callback" + qs;
  } else if (p.get('error')) {
    msg.textContent = "Authorization failed.";
    det.style.display = 'block';
    det.innerHTML = "<b>" + p.get('error') + "</b><br>" + (p.get('error_description') || '');
  } else {
    msg.textContent = "No authorization code received.";
  }
</script>
</body>
</html>
